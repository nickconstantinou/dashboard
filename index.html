<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Nick's Blog</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; background: #f5f5f5; }
        h1 { text-align: center; color: #333; }
        .post { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; cursor: pointer; }
        .post:hover { background: #f0f0f0; }
        .date { color: #888; font-size: 12px; }
        .title { font-size: 18px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Nick's Blog</h1>
    <div id="posts">Loading...</div>
    
    <script type="module">
        // Load posts directly as JSON
        const resp = await fetch('posts.json');
        const posts = await resp.json();
        
        let html = '';
        for (const p of posts.slice(0, 15)) {
            html += `<div class="post" onclick="location.href='${p.url}'">
                <div class="date">${p.date} • ${p.category || 'Blog'}</div>
                <div class="title">${p.title}</div>
            </div>`;
        }
        document.getElementById('posts').innerHTML = html;
    </script>
</body>
</html>
