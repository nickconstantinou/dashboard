<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nick's Blog — Daily thoughts, learnings and insights</title>
  <meta name="description" content="Daily thoughts, learnings and insights on FPL, tech, health, and more. Auto-updated daily.">
  <meta property="og:title" content="Nick's Blog">
  <meta property="og:description" content="Daily thoughts, learnings and insights on FPL, tech, health, and more.">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0F172A;
      --accent: #F97316;
      --bg: #F8FAFC;
      --card-bg: #FFFFFF;
      --text: #1E293B;
      --text-muted: #64748B;
      --border: #E2E8F0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }

    /* ── Header ── */
    header { background: var(--card-bg); border-bottom: 1px solid var(--border); padding: 28px 0; }
    .header-inner { max-width: 760px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .logo { font-family: 'Space Grotesk', sans-serif; font-size: 26px; font-weight: 700; color: var(--primary); text-decoration: none; }
    .logo span { color: var(--accent); }
    .header-links { display: flex; gap: 16px; align-items: center; }
    .header-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.15s; }
    .header-links a:hover { color: var(--accent); }
    .tagline { max-width: 760px; margin: 0 auto; padding: 16px 24px 0; font-size: 14px; color: var(--text-muted); }

    /* ── Layout ── */
    .container { max-width: 760px; margin: 0 auto; padding: 24px; }

    /* ── Filters ── */
    .filter-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-btn {
      padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card-bg); cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif;
      color: var(--text-muted); font-weight: 500; transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

    /* ── Post cards ── */
    .post {
      background: var(--card-bg); border-radius: 12px; padding: 20px;
      margin-bottom: 10px; border: 1px solid var(--border);
      cursor: pointer; transition: all 0.15s;
      display: grid; grid-template-columns: 1fr auto; gap: 4px 12px; align-items: start;
    }
    .post:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(249,115,22,0.08); transform: translateY(-1px); }
    .post-meta { font-size: 12px; color: var(--text-muted); grid-column: 1; margin-bottom: 4px; }
    .post-title { font-size: 17px; font-weight: 600; color: var(--primary); font-family: 'Space Grotesk', sans-serif; grid-column: 1; line-height: 1.35; margin-bottom: 8px; }
    .post-excerpt { font-size: 13px; color: var(--text-muted); grid-column: 1; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .post-type-badge { grid-column: 2; grid-row: 1 / 3; align-self: start; font-size: 18px; line-height: 1; padding-top: 2px; }

    /* ── Load more ── */
    .load-more-wrap { text-align: center; margin: 24px 0 8px; }
    .load-more-btn {
      padding: 10px 28px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--card-bg); cursor: pointer; font-size: 14px; font-family: 'Inter', sans-serif;
      color: var(--text-muted); font-weight: 500; transition: all 0.15s;
    }
    .load-more-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Post count ── */
    .post-count { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

    /* ── States ── */
    .loading { text-align: center; padding: 48px; color: var(--text-muted); font-size: 15px; }

    /* ── Footer ── */
    footer { border-top: 1px solid var(--border); padding: 24px; text-align: center; margin-top: 16px; }
    footer p { font-size: 13px; color: var(--text-muted); }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">Nick's <span>Blog</span></a>
      <nav class="header-links">
        <a href="fpl.html">FPL Dashboard →</a>
      </nav>
    </div>
    <p class="tagline">Daily thoughts, learnings and insights — auto-updated</p>
  </header>

  <div class="container">
    <div class="filter-bar" id="filters">
      <button class="filter-btn active" data-cat="all">All</button>
    </div>

    <p class="post-count" id="postCount"></p>

    <div id="posts">
      <div class="loading">Loading posts…</div>
    </div>

    <div class="load-more-wrap">
      <button class="load-more-btn" id="loadMore" type="button" style="display:none">Load more</button>
    </div>
  </div>

  <footer>
    <p>Nick's Blog — updated daily</p>
  </footer>

  <script type="module">
    const TYPE_ICON = {
      youtube:  '📺',
      podcast:  '🎙️',
      roundup:  '📊',
      news:     '📰',
      blog:     '📝',
    };
    function typeIcon(type, category) {
      if (TYPE_ICON[type]) return TYPE_ICON[type];
      const cat = (category || '').toLowerCase();
      if (cat.includes('fpl')) return '⚽';
      return '📝';
    }
    function stripHtml(html) {
      return html.replace(/<[^>]+>/g, ' ').replace(/\s+/g, ' ').trim();
    }

    let allPosts = [];
    let currentFilter = 'all';
    let currentPage = 0;
    const PAGE_SIZE = 30;
    const categoryPriority = ['FPL Roundups', 'FPL', 'AI/Tech', 'Tech/Business', 'Tech', 'AI', 'Blog'];

    function getFiltered() {
      return currentFilter === 'all'
        ? allPosts
        : allPosts.filter(p => (p.category || 'Blog') === currentFilter);
    }

    function updateControls() {
      const filtered = getFiltered();
      const shown = Math.min(currentPage * PAGE_SIZE, filtered.length);
      document.getElementById('postCount').textContent =
        currentFilter === 'all'
          ? `${allPosts.length} posts`
          : `${filtered.length} of ${allPosts.length} posts`;
      const btn = document.getElementById('loadMore');
      btn.style.display = shown < filtered.length ? 'inline-block' : 'none';
    }

    function renderPosts(filter) {
      if (filter !== undefined) {
        currentFilter = filter;
        currentPage = 0;
        document.getElementById('posts').innerHTML = '';
      }
      const filtered = getFiltered();
      const start = currentPage * PAGE_SIZE;
      const page = filtered.slice(start, start + PAGE_SIZE);

      if (page.length === 0 && currentPage === 0) {
        document.getElementById('posts').innerHTML = '<div class="loading">No posts found</div>';
        updateControls();
        return;
      }

      const container = document.getElementById('posts');
      let html = '';
      for (const p of page) {
        const icon = typeIcon(p.type, p.category);
        const excerpt = p.excerpt ? stripHtml(p.excerpt).slice(0, 140) : '';
        html += `<div class="post" onclick="location.href='${p.url}'">
          <div class="post-meta">${p.date} · ${p.category || 'Blog'}</div>
          <div class="post-type-badge" title="${p.type || ''}">${icon}</div>
          <div class="post-title">${p.title}</div>
          ${excerpt ? `<div class="post-excerpt">${excerpt}</div>` : ''}
        </div>`;
      }
      container.insertAdjacentHTML('beforeend', html);
      currentPage++;
      updateControls();
    }

    function buildFilters() {
      const seen = new Set();
      const categories = allPosts
        .map(p => p.category || 'Blog')
        .filter(cat => { if (seen.has(cat)) return false; seen.add(cat); return true; })
        .sort((a, b) => {
          const ai = categoryPriority.indexOf(a), bi = categoryPriority.indexOf(b);
          if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
          return a.localeCompare(b);
        });

      const filters = document.getElementById('filters');
      filters.innerHTML = '<button class="filter-btn active" data-cat="all">All</button>' +
        categories.map(cat => `<button class="filter-btn" data-cat="${cat}">${cat}</button>`).join('');

      filters.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
          filters.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderPosts(btn.dataset.cat);
        };
      });
    }

    document.getElementById('loadMore').onclick = () => renderPosts();

    const resp = await fetch('posts.js?v=' + Date.now());
    const jsCode = await resp.text();
    const m = jsCode.match(/var posts = ([\s\S]*);/);
    if (m) allPosts = JSON.parse(m[1]);

    buildFilters();
    renderPosts();
  </script>
</body>
</html>
