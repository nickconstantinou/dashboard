name: Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Validate static site
        run: |
          python3 - <<'PY'
          from pathlib import Path

          html = Path("index.html").read_text(encoding="utf-8")
          posts = Path("posts.js").read_text(encoding="utf-8")
          manifest = Path("content-manifest.json").read_text(encoding="utf-8")

          assert "<html" in html, "Invalid index.html"
          assert "var posts =" in posts or "const posts =" in posts, "Missing posts.js array"
          assert manifest.strip().startswith("["), "Invalid content-manifest.json"

          print("Static site validation passed")
          PY
